name: Unit Tests

run-name: "${{ github.event.inputs.title }}"

defaults:
  run:
    shell: bash -le {0}

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      title:
        description: 'set a title for this run'
        required: false
        default: ''
      repo:
        description: 'GitHub repo {owner}/{repo}'
        required: false
        default: ''
      ref:
        description: 'GitHub ref: Branch, Tag or Commit SHA'
        required: false
        default: ''
      pr_number:
        description: 'PR Number'
        required: false
        type: number
      test_regex:
        description: 'Regex to filter test files'
        required: false
        default: ''
      artifact_id:
        description: 'Run id for artifact to be downloaded'
        required: false
        default: ''
      max-parallel:
        description: 'Parallel jobs'
        required: false
        default: '4'
      model-test-mode:
        description: 'Model compat test mode'
        type: choice
        required: false
        default: 'fast'
        options:
          - 'fast'
          - 'slow'
      server:
        description: 'Wheel Build Server'
        type: choice
        default: '["self-hosted", "xeon5"]'
        options:
          - '["self-hosted", "xeon5"]'
          - '["self-hosted", "zen4"]'

env:
  CUDA_DEVICE_ORDER: PCI_BUS_ID
  CUDA_VISIBLE_DEVICES: 0
  # CI can allocate A100-class devices (sm_80), so the shared JIT arch list
  # must include 8.0 in addition to the newer targets.
  TORCH_CUDA_ARCH_LIST: '8.0 8.6 8.9 9.0 12.0'
  PYTORCH_ALLOC_CONF: 'expandable_segments:True'
  RUNNER: 10.0.13.31
  XEON5: 10.0.14.249
  LOGBAR_ANIMATION: '0'
  CUDA_VERSION: 130
  UV_TORCH_BACKEND: cu130
  TORCH_VERSION: 2.11.0
  # vllm doesn't support 3.14
  PYTHON_VERSION: 3.13
  UV_PYTHON: python3.13
  # PYTHON_GIL: 0 // test libs don't support yet
  IGNORED_TEST_FILES: "test_tgi.py,test_gptneox.py,models/test_mixtral.py,models/test_phi_3_moe.py,test_bits_new.py,models/test_internlm.py,models/test_internlm2_5.py,models/test_xverse.py"
  MODEL_TEST_MODE: ${{ github.event.inputs['model-test-mode'] || 'fast' }}
  MODEL_TEST_GPU_COUNT: '1'
  DEFUSER_GIT_URL: git+https://github.com/modelcloud/Defuser.git
  PYPCRE_GIT_URL: git+https://github.com/modelcloud/PyPcre.git
  TOKENICER_GIT_URL: git+https://github.com/modelcloud/Tokenicer.git
  LOGBAR_GIT_URL: git+https://github.com/modelcloud/LogBar.git
  EVALUTION_GIT_URL: git+https://github.com/modelcloud/Evalution.git
  repo: ${{ github.event.inputs.repo || github.repository }}
  ref: ${{ github.event.inputs.ref || github.ref }}
  HF_TOKEN: ${{ secrets.HF_TOKEN }}

concurrency:
  group: ${{ github.event.inputs.ref || github.ref }}-workflow-unit-tests #-${{ github.event.inputs.test_names }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-vm:
    runs-on: ubuntu-latest
    outputs:
      ip: ${{ steps.get_ip.outputs.ip }}
      run_id: ${{ steps.get_ip.outputs.run_id }}
      max-parallel: ${{ steps.get_ip.outputs['max-parallel'] }}
      cuda_version: ${{ env.CUDA_VERSION }}
    steps:
      - name: Print env
        run: |
          echo "repo: ${{ env.repo }}"
          echo "ref: ${{ env.ref }}"
          echo "artifact_id: ${{ github.event.inputs.artifact_id }}"
          echo "selected server: ${{ github.event.inputs.server }}"

      - name: Set server
        id: get_ip
        run: |
          echo "ip=$RUNNER" >> "$GITHUB_OUTPUT"

          echo "ip: $ip"

          if [ -n "${{ github.event.inputs.artifact_id }}" ]; then
            run_id="${{ github.event.inputs.artifact_id }}"
          else
            run_id="${{ github.run_id }}"
          fi
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "artifact_id=$run_id"

          max_p=${{ github.event.inputs['max-parallel'] }}
          max_p="{\"size\": ${max_p:-20}}"
          echo "max-parallel=$max_p" >> "$GITHUB_OUTPUT"
          echo "max-parallel=$max_p"

  list-test-files:
    runs-on: ubuntu-latest
    outputs:
      torch-files: ${{ steps.files.outputs.torch-files }}
      model-files: ${{ steps.files.outputs.model-files }}
      m4-files: ${{ steps.files.outputs.m4-files }}

    steps:
      - name: Checkout Codes
        uses: actions/checkout@v6
        with:
          repository: ${{ env.repo }}
          ref: ${{ env.ref }}

      - name: Fetch PR by number
        if: ${{ github.event.inputs.pr_number != 0 }}
        run: |
          PR_NUMBER=${{ github.event.inputs.pr_number }}
          echo "pr number $PR_NUMBER"
          git config --global --add safe.directory $(pwd)
          git fetch origin pull/${PR_NUMBER}/head:pr-${PR_NUMBER}
          git checkout pr-${PR_NUMBER}

      - name: List files
        id: files
        run: |
          test_files=$(python3 .github/scripts/list_test_files.py \
          --ignored-test-files "$IGNORED_TEST_FILES" \
          --test-regex "${{ github.event.inputs.test_regex }}")

          IFS='|' read -r torch_test_files model_test_files mlx_files <<< "$test_files"

          echo "torch-files=$torch_test_files" >> "$GITHUB_OUTPUT"
          echo "model-files=$model_test_files" >> "$GITHUB_OUTPUT"
          echo "m4-files=$mlx_files" >> "$GITHUB_OUTPUT"

          echo "Test files: $test_files"
          echo "Torch Test files: $torch_test_files"
          echo "Model Compat Test files: $model_test_files"
          echo "MLX Test files: $mlx_files"
          echo "Ignored Test files: $IGNORED_TEST_FILES"

  test:
    needs:
      - list-test-files
      - check-vm
    runs-on: [ self-hosted, xeon5 ]
    container:
      image: ${{ needs.check-vm.outputs.ip }}:5000/nvidia/cuda:${{ needs.check-vm.outputs.cuda_version }}-ubuntu24.04_0325
      options: --device /dev/dri --ipc=host --runtime=nvidia --gpus all
      volumes:
        - /monster/ci/env/entrypoint.sh:/entrypoint.sh
        - /monster/ci/env/entrypoint.sh:/etc/profile.d/01-entrypoint.sh
        - /dev/dri/by-path:/dev/dri/by-path
        - /monster/ci/models:/monster/data/model
        - /monster/ci/dataset:/monster/data/model/dataset
        - /monster/ci/huggingface:/github/home/.cache/huggingface
        # - /monster/ci/uv:/opt/uv
        - /github/workspace/uv:/opt/uv
        - /monster/ci/uv/python:/opt/uv/python
        - /monster/ci/uv/cache/python:/opt/uv/cache/python
        - /monster/ci/uv/setup_uv_venv.sh:/opt/uv/setup_uv_venv.sh
        - /monster/ci/uv/uv:/opt/uv/uv
        - /monster/ci/uv/uvx:/opt/uv/uvx
        - /monster/ci/uv/env:/opt/uv/env
        - /monster/ci/uv/uv.toml:/opt/uv/uv.toml
        - /monster/ci/env:/opt/env
        - /monster/ci/dist:/opt/dist
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(needs.check-vm.outputs['max-parallel']).size || 20 }}
      matrix:
        test_script: ${{ fromJSON(needs.list-test-files.outputs.torch-files) }}
    if: always() && !cancelled() && needs.list-test-files.outputs.torch-files != '[]' #  || github.event.inputs.artifact_id != ''
    steps:
      - name: Checkout Codes
        uses: actions/checkout@v6
        with:
          repository: ${{ env.repo }}
          ref: ${{ env.ref }}

      - name: Fetch PR by number
        if: ${{ github.event.inputs.pr_number != 0 }}
        run: |
          PR_NUMBER=${{ github.event.inputs.pr_number }}
          echo "pr number $PR_NUMBER"
          git config --global --add safe.directory $(pwd)
          git fetch origin pull/${PR_NUMBER}/head:pr-${PR_NUMBER}
          git checkout pr-${PR_NUMBER}

      - name: decompress uv cache
        continue-on-error: true
        run: |
          if [ -f /opt/dist/uv.tar.xz ]; then
            TAR_FILE="/opt/dist/uv.tar.xz"
            LAST_FILE="/opt/uv/cache/lastmodified"
          
            # Get modification time of tar.xz file (epoch seconds)
            TAR_MTIME=$(stat -c %Y "$TAR_FILE")
          
            # Read last recorded modification time if file exists
            if [ -f "$LAST_FILE" ]; then
              LAST_MTIME=$(cat "$LAST_FILE")
            else
              LAST_MTIME=0
            fi
          
            # Compare timestamps to decide whether to decompress
            if [ "$TAR_MTIME" = "$LAST_MTIME" ]; then
              echo "uv.tar.xz unchanged, skip decompress"
            else
              echo "decompressing uv.tar.xz..."
          
              # Prepare temporary directory
              mkdir -p /opt/uv/cache/tmp
              rm -rf /opt/uv/cache/tmp/*
          
              # Extract archive
              tar -xJf "$TAR_FILE" -C /opt/uv/cache/tmp
          
              # Replace existing uv directory
              rm -rf /opt/uv/cache/uv
              mv /opt/uv/cache/tmp/uv /opt/uv/cache/uv
          
              # Record latest modification time
              echo "$TAR_MTIME" > "$LAST_FILE"
          
              echo "done!"
              ls -ahl /opt/uv/cache
              echo "=========="
              ls -ahl /opt/uv/cache/uv
            fi
          fi

      - name: Activate uv env
        run: |
          echo "-- loading unit test's config --"
          source /opt/uv/setup_uv_venv.sh unit_test_env

          config_json="$(python3 .github/scripts/parse_test_config.py \
            --group tests \
            --test-name "${{ matrix.test_script }}")"

          py="$(printf '%s' "$config_json" | python3 -c 'import json, sys; print(json.load(sys.stdin)["py"])')"
          gpu="$(printf '%s' "$config_json" | python3 -c 'import json, sys; print(json.load(sys.stdin)["gpu"])')"

          echo "PYTHON_VERSION=$py" >> "$GITHUB_ENV"
          echo "GPU_COUNT=$gpu" >> "$GITHUB_ENV"
          
          echo "using py=$py gpu=$gpu for test ${{ matrix.test_script }}"
          echo "-- loaded --"

          echo "-- setting up env --"
          env_name="gptqmodel_test_cu${{ needs.check-vm.outputs.cuda_version }}_torch${{ env.TORCH_VERSION }}_py${py}_${{ matrix.test_script }}"
          /opt/uv/setup_uv_venv.sh $env_name
          echo "-- set --"

      - name: Setup uv env
        run: |
          python -V
          which python
          which pip || true

          echo "--- setting env... cuda=${{ needs.check-vm.outputs.cuda_version }} torch=${{ env.TORCH_VERSION }} python=${{ env.PYTHON_VERSION }}"
          bash /opt/env/init_compiler_no_env.sh ${{ needs.check-vm.outputs.cuda_version }} ${{ env.TORCH_VERSION }} ${{ env.PYTHON_VERSION }}

          echo ""
          echo ""

          echo "--- installing required deps..."
          python .github/scripts/install_deps.py ${{ matrix.test_script }}

          echo ""
          echo ""

          echo "--- uninstalling required deps..."
          python .github/scripts/uninstall_deps.py ${{ matrix.test_script }}

      # - name: Install Evalution
      #   run: |
      #     uv pip install git+https://x-access-token:${{ secrets.REPO_TOKEN }}@github.com/ModelCloud/Evalution.git
      #      - name: Install requirements
      #        run: |
      #          bash -c "$(curl -L http://${RUNNER}/scripts/env/init_compiler_no_env.sh)" @ ${{ needs.check-vm.outputs.cuda_version }} ${{ env.TORCH_VERSION }} $python_version${{ env.PYTHON_VERSION }}

      #      - name: Download source from local
      #        continue-on-error: true
      #        run: |
      #          curl -s -O  http://$RUNNER/whl/${{ env.repo }}/${{ github.run_id }}/gptqmodel_source.tar.gz
      #          ls -ahl .
      #          sha256=$(sha256sum $file_name)
      #          echo "sha256=$sha256"
      #          echo "SOURCE_DOWNLOADED=1" >> $GITHUB_ENV

      # - name: Download source from github
      #   if: env.SOURCE_DOWNLOADED == '' && !cancelled()
      #   uses: actions/download-artifact@v8
      #   with:
      #     name: source
      #     path: dist
      #     run-id: ${{ github.run_id }}

      #     - name: Uncompress source
      #      continue-on-error: true
      #     run: |
      #      find . -mindepth 1 ! -name "gptqmodel_source.tar.gz" -exec rm -rf {} +
      #     ls -ahl .
      #    tar -zxf gptqmodel_source.tar.gz

      - name: Install package from source
        run: |
          uv pip uninstall gptqmodel || true
          # make sure torch & torchvision are corresponded
          /opt/env/install_torch.sh ${{ needs.check-vm.outputs.cuda_version }} ${{ env.TORCH_VERSION }}
          uv pip install -r requirements.txt  -i http://$RUNNER/simple/ --trusted-host $RUNNER --extra-index-url https://pypi.org/simple

          echo "===== install package from checkout ====="
          uv pip install . -i http://$RUNNER/simple/ --trusted-host $RUNNER --extra-index-url https://pypi.org/simple

          echo "===== install ModelCloud git deps ====="
          for pkg in defuser pypcre tokenicer logbar evalution; do
            uv pip uninstall "$pkg" || true
          done
          for url in \
            "$DEFUSER_GIT_URL" \
            "$PYPCRE_GIT_URL" \
            "$TOKENICER_GIT_URL" \
            "$LOGBAR_GIT_URL" \
            "$EVALUTION_GIT_URL"
          do
            uv pip install "$url"
          done

          # deps may reinstalled torch
          /opt/env/install_torch.sh ${{ needs.check-vm.outputs.cuda_version }} ${{ env.TORCH_VERSION }}

      - name: Print uv env
        run: |
          echo "::group::uv python list"
          uv python list
          echo "::endgroup::"

          which python
          which pip || true
          python -V

          echo "::group::uv python list"
          uv python list
          echo "::endgroup::"

          echo "== nvcc =="
          nvcc --version

          echo "== torch =="
          uv pip show torch || true

          echo "::group::project files"
          ls -ahl
          echo "::endgroup::"

          echo "== torch =="
          uv pip show torch

          echo "::group::pip list"
          uv pip list
          echo "::endgroup::"

      - name: Find suitable GPU
        if: ${{ !contains(matrix.test_script, 'ipex') && !contains(matrix.test_script, 'xpu') && !cancelled() }}
        run: |
          python .github/scripts/allocate_gpu.py \
            --base-url "http://${XEON5}" \
            --run-id "${{ github.run_id }}" \
            --test "${{ matrix.test_script }}" \
            --runner "${RUNNER_NAME:-unknown}" \
            --count "${{ env.GPU_COUNT }}"


      - name: Run tests
        run: |
          extra_args=()
          if [[ "${{ matrix.test_script }}" == *ipex* ]]; then
            extra_args+=(--clear-cuda)
          fi
          if [[ "${{ matrix.test_script }}" == *xpu* ]]; then
            extra_args+=(--clear-cuda --xpu-mode)
          fi
          python .github/scripts/run_tests.py \
            --base-url "http://${XEON5}" \
            --run-id "${{ github.run_id }}" \
            --test-script "${{ matrix.test_script }}" \
            --runner "${RUNNER_NAME}" \
            --gpu-id "${{ env.CUDA_VISIBLE_DEVICES }}" \
            "${extra_args[@]}"

      - name: Check log
        if: ${{ !cancelled() &&  failure() }}
        continue-on-error: true
        run: |
          log_dir=/opt/dist/GPTQModel/${{ github.run_id }}/logs
          log_file=$log_dir/${{ matrix.test_script }}.log

          grep -nE "nvcc fatal|error:|fatal error|ModuleNotFoundError|ImportError|AssertionError|Exception|is the correct path|No such file or directory|Repo id must be in" "$log_file" | head -n 50 || true
          
          tail -n 200 $log_file
          exit 1

      - name: Release GPU
        if: always() && !contains(matrix.test_script, 'ipex') && !contains(matrix.test_script, 'xpu')
        run: |
          python .github/scripts/release_gpu.py \
            --base-url "http://${XEON5}" \
            --run-id "${{ github.run_id }}" \
            --gpu-id "${{ env.CUDA_VISIBLE_DEVICES }}" \
            --timestamp "${{ env.STEP_TIMESTAMP }}" \
            --test "${{ matrix.test_script }}" \
            --runner "${RUNNER_NAME}"

      - name: Clean cache
        if: always()
        run: |
          echo "Cleaning workspace: $PWD"
          rm -rf ./* .[^.] .??* || true
          echo "cleaning venv: ${{ env.VIRTUAL_ENV }}"
          rm -rf "${{ env.VIRTUAL_ENV }}"

  test-models:
    needs:
      - list-test-files
      - check-vm
    runs-on: [ self-hosted, xeon5 ]
    container:
      image: ${{ needs.check-vm.outputs.ip }}:5000/nvidia/cuda:${{ needs.check-vm.outputs.cuda_version }}-ubuntu24.04_0325
      options: --device /dev/dri --ipc=host --runtime=nvidia --gpus all
      volumes:
        - /monster/ci/env/entrypoint.sh:/entrypoint.sh
        - /monster/ci/env/entrypoint.sh:/etc/profile.d/01-entrypoint.sh
        - /dev/dri/by-path:/dev/dri/by-path
        - /monster/ci/models:/monster/data/model
        - /monster/ci/dataset:/monster/data/model/dataset
        - /monster/ci/huggingface:/github/home/.cache/huggingface
        # - /monster/ci/uv:/opt/uv
        - /github/workspace/uv:/opt/uv
        - /monster/ci/uv/python:/opt/uv/python
        - /monster/ci/uv/cache/python:/opt/uv/cache/python
        - /monster/ci/uv/setup_uv_venv.sh:/opt/uv/setup_uv_venv.sh
        - /monster/ci/uv/uv:/opt/uv/uv
        - /monster/ci/uv/uvx:/opt/uv/uvx
        - /monster/ci/uv/env:/opt/uv/env
        - /monster/ci/uv/uv.toml:/opt/uv/uv.toml
        - /monster/ci/env:/opt/env
        - /monster/ci/dist:/opt/dist
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(needs.check-vm.outputs['max-parallel']).size || 20 }}
      matrix:
        test_script: ${{ fromJSON(needs.list-test-files.outputs.model-files) }}
    if: always() && !cancelled() && needs.list-test-files.outputs.model-files != '[]'
    steps:
      - name: Checkout Codes
        uses: actions/checkout@v6
        with:
          repository: ${{ env.repo }}
          ref: ${{ env.ref }}

      - name: Fetch PR by number
        if: ${{ github.event.inputs.pr_number != 0 }}
        run: |
          PR_NUMBER=${{ github.event.inputs.pr_number }}
          echo "pr number $PR_NUMBER"
          git config --global --add safe.directory $(pwd)
          git fetch origin pull/${PR_NUMBER}/head:pr-${PR_NUMBER}
          git checkout pr-${PR_NUMBER}

      - name: decompress uv cache
        continue-on-error: true
        run: |
          if [ -f /opt/dist/uv.tar.xz ]; then
            TAR_FILE="/opt/dist/uv.tar.xz"
            LAST_FILE="/opt/uv/cache/lastmodified"
          
            # Get modification time of tar.xz file (epoch seconds)
            TAR_MTIME=$(stat -c %Y "$TAR_FILE")
          
            # Read last recorded modification time if file exists
            if [ -f "$LAST_FILE" ]; then
              LAST_MTIME=$(cat "$LAST_FILE")
            else
              LAST_MTIME=0
            fi
          
            # Compare timestamps to decide whether to decompress
            if [ "$TAR_MTIME" = "$LAST_MTIME" ]; then
              echo "uv.tar.xz unchanged, skip decompress"
            else
              echo "decompressing uv.tar.xz..."
          
              # Prepare temporary directory
              mkdir -p /opt/uv/cache/tmp
              rm -rf /opt/uv/cache/tmp/*
          
              # Extract archive
              tar -xJf "$TAR_FILE" -C /opt/uv/cache/tmp
          
              # Replace existing uv directory
              rm -rf /opt/uv/cache/uv
              mv /opt/uv/cache/tmp/uv /opt/uv/cache/uv
          
              # Record latest modification time
              echo "$TAR_MTIME" > "$LAST_FILE"
          
              echo "done!"
              ls -ahl /opt/uv/cache
              echo "=========="
              ls -ahl /opt/uv/cache/uv
            fi
          fi

      - name: Activate uv env
        run: |
          env_name="gptqmodel_test_cu${{ needs.check-vm.outputs.cuda_version }}_torch${{ env.TORCH_VERSION }}_py${{ env.PYTHON_VERSION }}_${{ matrix.test_script }}"
          /opt/uv/setup_uv_venv.sh $env_name

      - name: Setup uv env
        run: |
          python -V
          which python
          which pip || true
          echo "uv cache dir: $(uv cache dir)"

          echo "setting env... cuda=${{ needs.check-vm.outputs.cuda_version }} torch=${{ env.TORCH_VERSION }} python=${{ env.PYTHON_VERSION }}"
          bash /opt/env/init_compiler_no_env.sh ${{ needs.check-vm.outputs.cuda_version }} ${{ env.TORCH_VERSION }} ${{ env.PYTHON_VERSION }}
          python .github/scripts/install_deps.py ${{ matrix.test_script }}
          python .github/scripts/uninstall_deps.py ${{ matrix.test_script }}

      - name: Install package from source
        run: |
          uv pip uninstall gptqmodel || true
          /opt/env/install_torch.sh ${{ needs.check-vm.outputs.cuda_version }} ${{ env.TORCH_VERSION }}
          uv pip install -r requirements.txt  -i http://$RUNNER/simple/ --trusted-host $RUNNER --extra-index-url https://pypi.org/simple
          uv pip install . -i http://$RUNNER/simple/ --trusted-host $RUNNER --extra-index-url https://pypi.org/simple
          for pkg in defuser pypcre tokenicer logbar evalution; do
            uv pip uninstall "$pkg" || true
          done
          for url in \
            "$DEFUSER_GIT_URL" \
            "$PYPCRE_GIT_URL" \
            "$TOKENICER_GIT_URL" \
            "$LOGBAR_GIT_URL" \
            "$EVALUTION_GIT_URL"
          do
            uv pip install "$url"
          done
          /opt/env/install_torch.sh ${{ needs.check-vm.outputs.cuda_version }} ${{ env.TORCH_VERSION }}

      - name: Print uv env
        run: |
          echo "::group::uv python list"
          uv python list
          echo "::endgroup::"

          which python
          which pip || true
          python -V

          echo "::group::uv python list"
          uv python list
          echo "::endgroup::"

          echo "== nvcc =="
          nvcc --version

          echo "::group::project files"
          ls -ahl
          echo "::endgroup::"

          echo "== torch =="
          uv pip show torch

          echo "::group::pip list"
          uv pip list
          echo "::endgroup::"

      - name: Find suitable GPU
        if: ${{ !cancelled() }}
        run: |
          python .github/scripts/allocate_gpu.py \
            --base-url "http://${XEON5}" \
            --run-id "${{ github.run_id }}" \
            --test "${{ matrix.test_script }}" \
            --runner "${RUNNER_NAME:-unknown}" \
            --count "1" \
            --require-single

      - name: Run tests
        run: |
          python .github/scripts/run_tests.py \
            --base-url "http://${XEON5}" \
            --run-id "${{ github.run_id }}" \
            --test-script "${{ matrix.test_script }}" \
            --runner "${RUNNER_NAME}" \
            --gpu-id "${{ env.CUDA_VISIBLE_DEVICES }}" \
            --model-test-mode "${MODEL_TEST_MODE}"

      - name: Check log
        if: ${{ !cancelled() && failure() }}
        continue-on-error: true
        run: |
          log_dir=/opt/dist/GPTQModel/${{ github.run_id }}/logs
          log_file=$log_dir/${{ matrix.test_script }}.log

          grep -nE "nvcc fatal|error:|fatal error|ModuleNotFoundError|ImportError|AssertionError|Exception|is the correct path|No such file or directory|Repo id must be in" "$log_file" | head -n 50 || true
          tail -n 200 $log_file
          exit 1

      - name: Release GPU
        if: always()
        run: |
          python .github/scripts/release_gpu.py \
            --base-url "http://${XEON5}" \
            --run-id "${{ github.run_id }}" \
            --gpu-id "${{ env.CUDA_VISIBLE_DEVICES }}" \
            --timestamp "${{ env.STEP_TIMESTAMP }}" \
            --test "${{ matrix.test_script }}" \
            --runner "${RUNNER_NAME}"

      - name: Clean cache
        if: always()
        run: |
          echo "Cleaning workspace: $PWD"
          rm -rf ./* .[^.] .??* || true
          echo "cleaning venv: ${{ env.VIRTUAL_ENV }}"
          rm -rf "${{ env.VIRTUAL_ENV }}"

  check-torch:
    runs-on: [ self-hosted, xeon5 ]
    container:
      image: 10.0.13.31:5000/nvidia/cuda:130-ubuntu24.04_0325
      options: --device /dev/dri --ipc=host --runtime=nvidia --gpus all
      volumes:
        - /monster/ci/env/entrypoint.sh:/entrypoint.sh
        - /monster/ci/env/entrypoint.sh:/etc/profile.d/01-entrypoint.sh
        - /dev/dri/by-path:/dev/dri/by-path
        - /monster/ci/uv:/opt/uv
        - /monster/ci/env:/opt/env
    steps:
      - name: Checkout Codes
        uses: actions/checkout@v6
        with:
          repository: ${{ env.repo }}
          ref: ${{ env.ref }}

      - name: Test pypi pip
        run: |
          uv venv pypi_pip_env
          source pypi_pip_env/bin/activate
          uv pip install pip -U
          pip install gptqmodel torch -U

      - name: Test pypi uv
        run: |
          uv venv pypi_uv_env
          source pypi_uv_env/bin/activate
          uv pip install gptqmodel torch -U

      - name: test local pip
        run: |
          uv venv local_pip_env
          source local_pip_env/bin/activate
          uv pip install pip -U
          pip install . torch -U

      - name: test local uv
        run: |
          uv venv local_uv_env
          source local_uv_env/bin/activate
          uv pip install . torch -U


  prepare-setuptools:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.parser.outputs.versions || '[]' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Generate version matrix
        id: parser
        run: |
          python -m pip install --upgrade requests packaging
          versions=$(python .github/scripts/ci_loop_versions.py setuptools ">=77.0.1,<83")
          echo "versions=$versions" >> "$GITHUB_OUTPUT"

  check-setuptools:
    needs: prepare-setuptools
    if: needs.prepare-setuptools.outputs.versions != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJSON(needs.prepare-setuptools.outputs.versions) }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install package with selected setuptools
        run: |
          python -m pip install --upgrade pip
          python -m pip install . "setuptools==${{ matrix.version }}"

      - name: Show versions
        run: |
          python --version
          python -m pip show setuptools
