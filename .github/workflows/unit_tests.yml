name: Unit Tests

run-name: "${{ github.event.inputs.title }}"

defaults:
  run:
    shell: bash -le {0}

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      title:
        description: 'set a title for this run'
        required: false
        default: ''
      repo:
        description: 'GitHub repo {owner}/{repo}'
        required: false
        default: ''
      ref:
        description: 'GitHub ref: Branch, Tag or Commit SHA'
        required: false
        default: ''
      pr_number:
        description: 'PR Number'
        required: false
        type: number
      test_regex:
        description: 'Regex to filter test files'
        required: false
        default: ''
      artifact_id:
        description: 'Run id for artifact to be downloaded'
        required: false
        default: ''
      max-parallel:
        description: 'Parallel jobs'
        required: false
        default: '4'
      model-test-mode:
        description: 'Model compat test mode'
        type: choice
        required: false
        default: 'fast'
        options:
          - 'fast'
          - 'slow'
      server:
        description: 'Wheel Build Server'
        type: choice
        default: '["self-hosted", "xeon5"]'
        options:
          - '["self-hosted", "xeon5"]'
          - '["self-hosted", "zen4"]'

env:
  CUDA_DEVICE_ORDER: PCI_BUS_ID
  CUDA_VISIBLE_DEVICES: 0
  # CI can allocate A100-class devices (sm_80), so the shared JIT arch list
  # must include 8.0 in addition to the newer targets.
  TORCH_CUDA_ARCH_LIST: '8.0 8.6 8.9 9.0 12.0'
  PYTORCH_ALLOC_CONF: 'expandable_segments:True'
  RUNNER: 10.0.13.31
  XEON5: 10.0.14.249
  LOGBAR_ANIMATION: '0'
  CUDA_VERSION: 130
  UV_TORCH_BACKEND: cu130
  TORCH_VERSION: 2.11.0
  # vllm doesn't support 3.14
  PYTHON_VERSION: 3.13
  UV_PYTHON: python3.13
  # PYTHON_GIL: 0 // test libs don't support yet
  IGNORED_TEST_FILES: "test_tgi.py,test_gptneox.py,models/test_mixtral.py,models/test_phi_3_moe.py,test_bits_new.py,models/test_internlm.py,models/test_internlm2_5.py,models/test_xverse.py"
  MODEL_TEST_MODE: ${{ github.event.inputs['model-test-mode'] || 'fast' }}
  MODEL_TEST_GPU_COUNT: '1'
  DEFUSER_GIT_URL: git+https://github.com/modelcloud/Defuser.git
  PYPCRE_GIT_URL: git+https://github.com/modelcloud/PyPcre.git
  TOKENICER_GIT_URL: git+https://github.com/modelcloud/Tokenicer.git
  LOGBAR_GIT_URL: git+https://github.com/modelcloud/LogBar.git
  EVALUTION_GIT_URL: git+https://github.com/modelcloud/Evalution.git
  repo: ${{ github.event.inputs.repo || github.repository }}
  ref: ${{ github.event.inputs.ref || github.ref }}
  HF_TOKEN: ${{ secrets.HF_TOKEN }}

concurrency:
  group: ${{ github.event.inputs.ref || github.ref }}-workflow-unit-tests #-${{ github.event.inputs.test_names }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-vm:
    runs-on: ubuntu-latest
    outputs:
      ip: ${{ steps.get_ip.outputs.ip }}
      run_id: ${{ steps.get_ip.outputs.run_id }}
      install_ts: ${{ steps.get_ip.outputs.install_ts }}
      max-parallel: ${{ steps.get_ip.outputs['max-parallel'] }}
      cuda_version: ${{ env.CUDA_VERSION }}
    steps:
      - name: Print env
        run: |
          echo "repo: ${{ env.repo }}"
          echo "ref: ${{ env.ref }}"
          echo "artifact_id: ${{ github.event.inputs.artifact_id }}"
          echo "selected server: ${{ github.event.inputs.server }}"

      - name: Set server
        id: get_ip
        run: |
          echo "ip=$RUNNER" >> "$GITHUB_OUTPUT"

          echo "ip: $ip"

          if [ -n "${{ github.event.inputs.artifact_id }}" ]; then
            run_id="${{ github.event.inputs.artifact_id }}"
          else
            run_id="${{ github.run_id }}"
          fi
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "artifact_id=$run_id"

          install_ts="$(date +%s)"
          echo "install_ts=$install_ts" >> "$GITHUB_OUTPUT"
          echo "install_ts=$install_ts"

          max_p=${{ github.event.inputs['max-parallel'] }}
          max_p="{\"size\": ${max_p:-20}}"
          echo "max-parallel=$max_p" >> "$GITHUB_OUTPUT"
          echo "max-parallel=$max_p"

  list-test-files:
    runs-on: ubuntu-latest
    outputs:
      torch-files: ${{ steps.files.outputs.torch-files }}
      model-files: ${{ steps.files.outputs.model-files }}
      m4-files: ${{ steps.files.outputs.m4-files }}
      torch-envs: ${{ steps.files.outputs.torch-envs }}
      model-envs: ${{ steps.files.outputs.model-envs }}

    steps:
      - name: Checkout Codes
        uses: actions/checkout@v6
        with:
          repository: ${{ env.repo }}
          ref: ${{ env.ref }}

      - name: Fetch PR by number
        if: ${{ github.event.inputs.pr_number != 0 }}
        run: |
          PR_NUMBER=${{ github.event.inputs.pr_number }}
          echo "pr number $PR_NUMBER"
          git config --global --add safe.directory $(pwd)
          git fetch origin pull/${PR_NUMBER}/head:pr-${PR_NUMBER}
          git checkout pr-${PR_NUMBER}

      - name: List files
        id: files
        run: |
          test_files=$(python3 .github/scripts/list_test_files.py \
          --ignored-test-files "$IGNORED_TEST_FILES" \
          --test-regex "${{ github.event.inputs.test_regex }}")

          IFS='|' read -r torch_test_files model_test_files mlx_files <<< "$test_files"

          torch_envs=$(python3 .github/scripts/build_unit_test_env_matrix.py \
            --group tests \
            --tests-json "$torch_test_files")
          model_envs=$(python3 .github/scripts/build_unit_test_env_matrix.py \
            --group tests/models \
            --tests-json "$model_test_files")

          echo "torch-files=$torch_test_files" >> "$GITHUB_OUTPUT"
          echo "model-files=$model_test_files" >> "$GITHUB_OUTPUT"
          echo "m4-files=$mlx_files" >> "$GITHUB_OUTPUT"
          echo "torch-envs=$torch_envs" >> "$GITHUB_OUTPUT"
          echo "model-envs=$model_envs" >> "$GITHUB_OUTPUT"

          echo "Test files: $test_files"
          echo "Torch Test files: $torch_test_files"
          echo "Model Compat Test files: $model_test_files"
          echo "MLX Test files: $mlx_files"
          echo "Torch envs: $torch_envs"
          echo "Model envs: $model_envs"
          echo "Ignored Test files: $IGNORED_TEST_FILES"

  prepare:
    needs:
      - list-test-files
      - check-vm
    runs-on: [ self-hosted, xeon5 ]
    container:
      image: ${{ needs.check-vm.outputs.ip }}:5000/nvidia/cuda:${{ needs.check-vm.outputs.cuda_version }}-ubuntu24.04_0325
      options: --device /dev/dri --ipc=host --runtime=nvidia --gpus all
      volumes:
        - /monster/ci/env/entrypoint.sh:/entrypoint.sh
        - /monster/ci/env/entrypoint.sh:/etc/profile.d/01-entrypoint.sh
        - /dev/dri/by-path:/dev/dri/by-path
        - /monster/ci/models:/monster/data/model
        - /monster/ci/dataset:/monster/data/model/dataset
        - /monster/ci/huggingface:/github/home/.cache/huggingface
        - /monster/ci/uv:/opt/uv
        - /monster/ci/env:/opt/env
        - /monster/ci/dist:/opt/dist
    if: always() && !cancelled() && (needs.list-test-files.outputs.torch-envs != '[]' || needs.list-test-files.outputs.model-envs != '[]')
    steps:
      - name: Checkout Codes
        uses: actions/checkout@v6
        with:
          repository: ${{ env.repo }}
          ref: ${{ env.ref }}

      - name: Fetch PR by number
        if: ${{ github.event.inputs.pr_number != 0 }}
        run: |
          PR_NUMBER=${{ github.event.inputs.pr_number }}
          echo "pr number $PR_NUMBER"
          git config --global --add safe.directory $(pwd)
          git fetch origin pull/${PR_NUMBER}/head:pr-${PR_NUMBER}
          git checkout pr-${PR_NUMBER}

      - name: Prepare common envs
        run: |
          mapfile -t env_rows < <(
            python3 .github/scripts/print_env_rows.py \
              --torch-envs-json '${{ needs.list-test-files.outputs.torch-envs }}' \
              --model-envs-json '${{ needs.list-test-files.outputs.model-envs }}'
          )

          for row in "${env_rows[@]}"; do
              echo "::group::updating env for $row"
                IFS=$'\t' read -r env_name test_script python_version <<< "$row"
                echo "preparing env=$env_name test=$test_script py=$python_version"
                source /opt/uv/setup_uv_venv.sh "$env_name"
          
                python -V
                which python
                which pip || true
          
                bash /opt/env/init_compiler_no_env.sh \
                  "${{ needs.check-vm.outputs.cuda_version }}" \
                  "${{ env.TORCH_VERSION }}" \
                  "$python_version"
          
                python .github/scripts/install_deps.py "$test_script"
                python .github/scripts/uninstall_deps.py "$test_script"
          
                uv pip uninstall gptqmodel || true
                /opt/env/install_torch.sh ${{ needs.check-vm.outputs.cuda_version }} ${{ env.TORCH_VERSION }}
                uv pip install -r requirements.txt  -i http://$RUNNER/simple/ --trusted-host $RUNNER --extra-index-url https://pypi.org/simple
                for pkg in defuser pypcre tokenicer logbar evalution; do
                  uv pip uninstall "$pkg" || true
                done
                for url in \
                  "$DEFUSER_GIT_URL" \
                  "$PYPCRE_GIT_URL" \
                  "$TOKENICER_GIT_URL" \
                  "$LOGBAR_GIT_URL" \
                  "$EVALUTION_GIT_URL"
                do
                  uv pip install "$url"
                done
                /opt/env/install_torch.sh ${{ needs.check-vm.outputs.cuda_version }} ${{ env.TORCH_VERSION }}
          
                echo "::group::pip list"
                  uv pip list
                echo "::endgroup::"
              echo "::endgroup::"
          done

  torch:
    needs:
      - list-test-files
      - check-vm
      - prepare
    runs-on: [ self-hosted, xeon5 ]
    container:
      image: ${{ needs.check-vm.outputs.ip }}:5000/nvidia/cuda:${{ needs.check-vm.outputs.cuda_version }}-ubuntu24.04_0325
      options: --device /dev/dri --ipc=host --runtime=nvidia --gpus all
      volumes:
        - /monster/ci/env/entrypoint.sh:/entrypoint.sh
        - /monster/ci/env/entrypoint.sh:/etc/profile.d/01-entrypoint.sh
        - /dev/dri/by-path:/dev/dri/by-path
        - /monster/ci/models:/monster/data/model
        - /monster/ci/dataset:/monster/data/model/dataset
        - /monster/ci/huggingface:/github/home/.cache/huggingface
        - /monster/ci/uv:/opt/uv
        # - /monster/ci/uv/setup_uv_venv.sh:/opt/uv/setup_uv_venv.sh
        # - /monster/ci/uv/uv:/opt/uv/uv
        # - /monster/ci/uv/uvx:/opt/uv/uvx
        # - /monster/ci/uv/env:/opt/uv/env
        # - /monster/ci/uv/uv.toml:/opt/uv/uv.toml
        - /monster/ci/env:/opt/env
        - /monster/ci/dist:/opt/dist
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(needs.check-vm.outputs['max-parallel']).size || 20 }}
      matrix:
        test_script: ${{ fromJSON(needs.list-test-files.outputs.torch-files) }}
    if: always() && !cancelled() && needs.list-test-files.outputs.torch-files != '[]' #  || github.event.inputs.artifact_id != ''
    steps:
      - name: Checkout Codes
        uses: actions/checkout@v6
        with:
          repository: ${{ env.repo }}
          ref: ${{ env.ref }}

      - name: Fetch PR by number
        if: ${{ github.event.inputs.pr_number != 0 }}
        run: |
          PR_NUMBER=${{ github.event.inputs.pr_number }}
          echo "pr number $PR_NUMBER"
          git config --global --add safe.directory $(pwd)
          git fetch origin pull/${PR_NUMBER}/head:pr-${PR_NUMBER}
          git checkout pr-${PR_NUMBER}

      - name: Activate uv env
        run: |
          # fix fatal: detected dubious ownership in repository at '/__w/GPTQModel/GPTQModel'
          git config --global --add safe.directory /__w/GPTQModel/GPTQModel
          source /opt/uv/setup_uv_venv.sh unit_test_env

          config_json="$(python3 .github/scripts/parse_test_config.py \
            --group tests \
            --test-name "${{ matrix.test_script }}")"

          gpu="$(printf '%s' "$config_json" | python3 -c 'import json, sys; print(json.load(sys.stdin)["gpu"])')"

          echo "GPU_COUNT=$gpu" >> "$GITHUB_ENV"
          has_specific_deps="$(python3 .github/scripts/has_specific_deps.py \
            --test-name "${{ matrix.test_script }}")"
          echo "HAS_SPECIFIC_DEPS=$has_specific_deps" >> "$GITHUB_ENV"
          
          env_name="$(python3 .github/scripts/get_unit_test_env_name.py \
            --test-name "${{ matrix.test_script }}")"
          echo "ENV_NAME=$env_name" >> "$GITHUB_ENV"
          echo "using gpu=$gpu specific=$has_specific_deps uv env=$env_name"
          /opt/uv/setup_uv_venv.sh $env_name

      - name: Setup uv env
        if: env.HAS_SPECIFIC_DEPS == '1'
        run: |
          config_json="$(python3 .github/scripts/parse_test_config.py \
            --group tests \
            --test-name "${{ matrix.test_script }}")"
          py="$(printf '%s' "$config_json" | python3 -c 'import json, sys; print(json.load(sys.stdin)["py"])')"

          python -V
          which python
          which pip || true

          echo "--- setting env... cuda=${{ needs.check-vm.outputs.cuda_version }} torch=${{ env.TORCH_VERSION }} python=$py"
          bash /opt/env/init_compiler_no_env.sh "${{ needs.check-vm.outputs.cuda_version }}" "${{ env.TORCH_VERSION }}" "$py"

          echo "--- installing required deps..."
          python .github/scripts/install_deps.py "${{ matrix.test_script }}"

          echo "--- uninstalling required deps..."
          python .github/scripts/uninstall_deps.py "${{ matrix.test_script }}"

      - name: Install package from source
        run: |
          install_key="${{ needs.check-vm.outputs.run_id }}_${{ needs.check-vm.outputs.install_ts }}"
          lock_dir="/opt/uv/locks"
          lock_file="${lock_dir}/${ENV_NAME}.${install_key}.lock"
          unlock_file="${lock_dir}/${ENV_NAME}.${install_key}.unlock"

          mkdir -p "$lock_dir"

          if [ -f "$unlock_file" ]; then
            echo "gptqmodel already installed for ${ENV_NAME} @ ${install_key}, skipping"
            exit 0
          fi

          exec 9>"$lock_file"
          cleanup_lock() {
            flock -u 9 || true
            exec 9>&- || true
            rm -f "$lock_file"
          }
          trap cleanup_lock EXIT

          if ! flock -n 9; then
            if [ -s "$lock_file" ]; then
              echo "lock owner: $(cat "$lock_file")"
            fi
            echo "waiting for lock: $lock_file"
            flock 9
          fi

          if [ -f "$unlock_file" ]; then
            echo "gptqmodel already installed for ${ENV_NAME} @ ${install_key}, skipping"
            exit 0
          fi

          printf 'test=%s job=%s run=%s env=%s\n' \
            "${{ matrix.test_script }}" \
            "${{ github.job }}" \
            "${{ needs.check-vm.outputs.run_id }}" \
            "${ENV_NAME}" > "$lock_file"

          uv pip uninstall gptqmodel || true
          uv pip install . --no-build-isolation -i http://$RUNNER/simple/ --trusted-host $RUNNER --extra-index-url https://pypi.org/simple

          mv "$lock_file" "$unlock_file"

          echo "::group::pip list"
            uv pip list
          echo "::endgroup::"

      - name: Find suitable GPU
        if: ${{ !contains(matrix.test_script, 'ipex') && !contains(matrix.test_script, 'xpu') && !cancelled() }}
        run: |
          python .github/scripts/allocate_gpu.py \
            --base-url "http://${XEON5}" \
            --run-id "${{ github.run_id }}" \
            --test "${{ matrix.test_script }}" \
            --runner "${RUNNER_NAME:-unknown}" \
            --count "${{ env.GPU_COUNT }}"


      - name: Run tests
        run: |
          extra_args=()
          if [[ "${{ matrix.test_script }}" == *ipex* ]]; then
            extra_args+=(--clear-cuda)
          fi
          if [[ "${{ matrix.test_script }}" == *xpu* ]]; then
            extra_args+=(--clear-cuda --xpu-mode)
          fi
          python .github/scripts/run_tests.py \
            --base-url "http://${XEON5}" \
            --run-id "${{ github.run_id }}" \
            --test-script "${{ matrix.test_script }}" \
            --runner "${RUNNER_NAME}" \
            --gpu-id "${{ env.CUDA_VISIBLE_DEVICES }}" \
            "${extra_args[@]}"

      - name: Check log
        if: ${{ !cancelled() &&  failure() }}
        continue-on-error: true
        run: |
          log_dir=/opt/dist/GPTQModel/${{ github.run_id }}/logs
          log_file=$log_dir/${{ matrix.test_script }}.log

          grep -nE "nvcc fatal|error:|fatal error|ModuleNotFoundError|ImportError|AssertionError|Exception|is the correct path|No such file or directory|Repo id must be in" "$log_file" | head -n 50 || true
          
          tail -n 200 $log_file
          exit 1

      - name: Release GPU
        if: always() && !contains(matrix.test_script, 'ipex') && !contains(matrix.test_script, 'xpu')
        run: |
          if [ -n "${ENV_NAME:-}" ]; then
            install_key="${{ needs.check-vm.outputs.run_id }}_${{ needs.check-vm.outputs.install_ts }}"
            lock_file="/opt/uv/locks/${ENV_NAME}.${install_key}.lock"
            if [ -e "$lock_file" ]; then
              echo "removing leftover install lock: $lock_file"
              rm -f "$lock_file"
            fi
          fi

          python .github/scripts/release_gpu.py \
            --base-url "http://${XEON5}" \
            --run-id "${{ github.run_id }}" \
            --gpu-id "${{ env.CUDA_VISIBLE_DEVICES }}" \
            --timestamp "${{ env.STEP_TIMESTAMP }}" \
            --test "${{ matrix.test_script }}" \
            --runner "${RUNNER_NAME}"

      - name: Clean cache
        if: always()
        run: |
          rm -rf rm -rf ./* .[^.] .??*

  torch-models:
    needs:
      - list-test-files
      - check-vm
      - prepare
    runs-on: [ self-hosted, xeon5 ]
    container:
      image: ${{ needs.check-vm.outputs.ip }}:5000/nvidia/cuda:${{ needs.check-vm.outputs.cuda_version }}-ubuntu24.04_0325
      options: --device /dev/dri --ipc=host --runtime=nvidia --gpus all
      volumes:
        - /monster/ci/env/entrypoint.sh:/entrypoint.sh
        - /monster/ci/env/entrypoint.sh:/etc/profile.d/01-entrypoint.sh
        - /dev/dri/by-path:/dev/dri/by-path
        - /monster/ci/models:/monster/data/model
        - /monster/ci/dataset:/monster/data/model/dataset
        - /monster/ci/huggingface:/github/home/.cache/huggingface
        - /monster/ci/uv:/opt/uv
        # - /monster/ci/uv/setup_uv_venv.sh:/opt/uv/setup_uv_venv.sh
        # - /monster/ci/uv/uv:/opt/uv/uv
        # - /monster/ci/uv/uvx:/opt/uv/uvx
        # - /monster/ci/uv/env:/opt/uv/env
        # - /monster/ci/uv/uv.toml:/opt/uv/uv.toml
        - /monster/ci/env:/opt/env
        - /monster/ci/dist:/opt/dist
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(needs.check-vm.outputs['max-parallel']).size || 20 }}
      matrix:
        test_script: ${{ fromJSON(needs.list-test-files.outputs.model-files) }}
    if: always() && !cancelled() && needs.list-test-files.outputs.model-files != '[]'
    steps:
      - name: Checkout Codes
        uses: actions/checkout@v6
        with:
          repository: ${{ env.repo }}
          ref: ${{ env.ref }}

      - name: Fetch PR by number
        if: ${{ github.event.inputs.pr_number != 0 }}
        run: |
          PR_NUMBER=${{ github.event.inputs.pr_number }}
          echo "pr number $PR_NUMBER"
          git config --global --add safe.directory $(pwd)
          git fetch origin pull/${PR_NUMBER}/head:pr-${PR_NUMBER}
          git checkout pr-${PR_NUMBER}

      - name: Activate uv env
        run: |
          source /opt/uv/setup_uv_venv.sh unit_test_env

          has_specific_deps="$(python3 .github/scripts/has_specific_deps.py \
            --test-name "${{ matrix.test_script }}")"
          echo "HAS_SPECIFIC_DEPS=$has_specific_deps" >> "$GITHUB_ENV"
          env_name="$(python3 .github/scripts/get_unit_test_env_name.py \
            --test-name "${{ matrix.test_script }}")"
          echo "ENV_NAME=$env_name" >> "$GITHUB_ENV"
          echo "using specific=$has_specific_deps uv env=$env_name"
          /opt/uv/setup_uv_venv.sh $env_name

      - name: Setup uv env
        if: env.HAS_SPECIFIC_DEPS == '1'
        run: |
          config_json="$(python3 .github/scripts/parse_test_config.py \
            --group tests/models \
            --test-name "${{ matrix.test_script }}")"
          py="$(printf '%s' "$config_json" | python3 -c 'import json, sys; print(json.load(sys.stdin)["py"])')"

          python -V
          which python
          which pip || true

          echo "--- setting env... cuda=${{ needs.check-vm.outputs.cuda_version }} torch=${{ env.TORCH_VERSION }} python=$py"
          bash /opt/env/init_compiler_no_env.sh "${{ needs.check-vm.outputs.cuda_version }}" "${{ env.TORCH_VERSION }}" "$py"

          echo "--- installing required deps..."
          python .github/scripts/install_deps.py "${{ matrix.test_script }}"

          echo "--- uninstalling required deps..."
          python .github/scripts/uninstall_deps.py "${{ matrix.test_script }}"

      - name: Install package from source
        run: |
          install_key="${{ needs.check-vm.outputs.run_id }}_${{ needs.check-vm.outputs.install_ts }}"
          lock_dir="/opt/uv/locks"
          lock_file="${lock_dir}/${ENV_NAME}.${install_key}.lock"
          unlock_file="${lock_dir}/${ENV_NAME}.${install_key}.unlock"

          mkdir -p "$lock_dir"

          if [ -f "$unlock_file" ]; then
            echo "gptqmodel already installed for ${ENV_NAME} @ ${install_key}, skipping"
            exit 0
          fi

          exec 9>"$lock_file"
          cleanup_lock() {
            flock -u 9 || true
            exec 9>&- || true
            rm -f "$lock_file"
          }
          trap cleanup_lock EXIT

          if ! flock -n 9; then
            if [ -s "$lock_file" ]; then
              echo "lock owner: $(cat "$lock_file")"
            fi
            echo "waiting for lock: $lock_file"
            flock 9
          fi

          if [ -f "$unlock_file" ]; then
            echo "gptqmodel already installed for ${ENV_NAME} @ ${install_key}, skipping"
            exit 0
          fi

          printf 'test=%s job=%s run=%s env=%s\n' \
            "${{ matrix.test_script }}" \
            "${{ github.job }}" \
            "${{ needs.check-vm.outputs.run_id }}" \
            "${ENV_NAME}" > "$lock_file"

          uv pip uninstall gptqmodel || true
          uv pip install . -i http://$RUNNER/simple/ --trusted-host $RUNNER --extra-index-url https://pypi.org/simple

          mv "$lock_file" "$unlock_file"

      - name: Find suitable GPU
        if: ${{ !cancelled() }}
        run: |
          python .github/scripts/allocate_gpu.py \
            --base-url "http://${XEON5}" \
            --run-id "${{ github.run_id }}" \
            --test "${{ matrix.test_script }}" \
            --runner "${RUNNER_NAME:-unknown}" \
            --count "1" \
            --require-single

      - name: Run tests
        run: |
          python .github/scripts/run_tests.py \
            --base-url "http://${XEON5}" \
            --run-id "${{ github.run_id }}" \
            --test-script "${{ matrix.test_script }}" \
            --runner "${RUNNER_NAME}" \
            --gpu-id "${{ env.CUDA_VISIBLE_DEVICES }}" \
            --model-test-mode "${MODEL_TEST_MODE}"

      - name: Check log
        if: ${{ !cancelled() && failure() }}
        continue-on-error: true
        run: |
          log_dir=/opt/dist/GPTQModel/${{ github.run_id }}/logs
          log_file=$log_dir/${{ matrix.test_script }}.log

          grep -nE "nvcc fatal|error:|fatal error|ModuleNotFoundError|ImportError|AssertionError|Exception|is the correct path|No such file or directory|Repo id must be in" "$log_file" | head -n 50 || true
          tail -n 200 $log_file
          exit 1

      - name: Release GPU
        if: always()
        run: |
          if [ -n "${ENV_NAME:-}" ]; then
            install_key="${{ needs.check-vm.outputs.run_id }}_${{ needs.check-vm.outputs.install_ts }}"
            lock_file="/opt/uv/locks/${ENV_NAME}.${install_key}.lock"
            if [ -e "$lock_file" ]; then
              echo "removing leftover install lock: $lock_file"
              rm -f "$lock_file"
            fi
          fi

          python .github/scripts/release_gpu.py \
            --base-url "http://${XEON5}" \
            --run-id "${{ github.run_id }}" \
            --gpu-id "${{ env.CUDA_VISIBLE_DEVICES }}" \
            --timestamp "${{ env.STEP_TIMESTAMP }}" \
            --test "${{ matrix.test_script }}" \
            --runner "${RUNNER_NAME}"

      - name: Clean cache
        if: always()
        run: |
          rm -rf rm -rf ./* .[^.] .??*

