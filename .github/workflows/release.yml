name: Release

run-name: "${{ github.event.inputs.title }}"

defaults:
  run:
    shell: bash -le {0}

on:
  release:
    types: [ published ]
  repository_dispatch:
  workflow_dispatch:
    inputs:
      title:
        description: 'set a title for this run'
        required: false
        default: ''
      repo:
        description: 'GitHub repo {owner}/{repo}'
        required: false
        default: ''
      ref:
        description: 'GitHub ref: Branch, Tag or Commit SHA'
        required: false
        default: ''
      pr_number:
        description: 'PR Number'
        required: false
        type: number
      upload_release:
        description: 'upload to release (it only works with a tag ref)'
        type: boolean
        required: false
        default: false
      upload_pypi:
        description: 'upload to PyPI'
        type: boolean
        required: false
        default: false
      github_vm:
        description: 'release source on github vm'
        type: boolean
        required: false
        default: false

env:
  RUNNER: 10.0.13.31
  repo: ${{ github.event.inputs.repo || github.repository }}
  ref: ${{ github.event.inputs.ref || github.ref }}

concurrency:
  group: ${{ github.event.inputs.ref || github.ref }}-workflow-release
  cancel-in-progress: true

jobs:
  check-vm:
    runs-on: [ self-hosted, Linux ]
    container:
      image: modelcloud/gptqmodel:alpine-ci-v1
    outputs:
      ip: ${{ steps.get_ip.outputs.ip }}
      run_id: ${{ steps.get_ip.outputs.run_id }}
    if: ${{ inputs.github_vm == false }}
    steps:
      - name: Checkout Codes
        uses: actions/checkout@v6
        with:
          repository: ${{ env.repo }}
          ref: ${{ env.ref }}

      - name: Print env
        run: |
          echo "event name: ${{ github.event_name }}"
          echo "repo: ${{ env.repo }}"
          echo "ref: ${{ env.ref }}"
          echo "upload_release: ${{ inputs.upload_release }}"
          echo "upload_pypi: ${{ inputs.upload_pypi }}"

      - name: Select server
        id: get_ip
        run: |
          echo "ip=${RUNNER}" >> "$GITHUB_OUTPUT"
          echo "run_id=${{ github.run_id }}" >> "$GITHUB_OUTPUT"

  release-source:
    permissions:
      contents: write
    runs-on: [ self-hosted, xeon5 ]
    needs:
      - check-vm
    if: ${{ inputs.github_vm == false }}
    container:
      image: ${{ needs.check-vm.outputs.ip }}:5000/nvidia/cuda:130-ubuntu24.04_0325
      volumes:
        - /monster/ci/env/entrypoint.sh:/etc/profile.d/01-entrypoint.sh
        - /monster/ci/uv:/opt/uv
    steps:
      - name: Checkout Codes
        uses: actions/checkout@v6
        with:
          repository: ${{ env.repo }}
          ref: ${{ env.ref }}

      - name: Trust workspace for git
        run: |
          git config --global --add safe.directory "$(pwd)"

      - name: Print env
        run: |
          export UV_PYTHON=3.14
          echo "UV_PYTHON=3.14" >> "$GITHUB_ENV"

          env_name="gptqmodel_py314_release_source"
          /opt/uv/setup_uv_venv.sh $env_name

      - name: Fetch PR by number
        if: ${{ github.event.inputs.pr_number != 0 }}
        run: |
          PR_NUMBER=${{ github.event.inputs.pr_number }}
          git config --global --add safe.directory "$(pwd)"
          git fetch origin pull/${PR_NUMBER}/head:pr-${PR_NUMBER}
          git checkout pr-${PR_NUMBER}

      - name: Build sdist
        run: |
          python -m pip install -U build twine setuptools
          python -m build --sdist

      - name: Check dist
        run: |
          ls -ahl dist
          pkg=$(ls -t dist/*.tar.gz | head -n 1 | xargs basename)
          echo "PKG_NAME=$pkg" >> "$GITHUB_ENV"
          twine check "dist/$pkg"

      - name: test installation
        run: |
          uv venv local_uv_env
          source local_uv_env/bin/activate
          uv pip install "dist/${{ env.PKG_NAME }}" torch

      - name: Upload to local
        continue-on-error: true
        run: |
          sha256sum "dist/${{ env.PKG_NAME }}"
          DIR=/opt/dist/${{ needs.check-vm.outputs.run_id }}
          [ -d "$DIR" ] || mkdir -p "$DIR"
          cp "dist/${{ env.PKG_NAME }}" "$DIR/"
          echo "UPLOADED=1" >> "$GITHUB_ENV"

      - name: Upload to artifact
        uses: actions/upload-artifact@v7
        continue-on-error: ${{ env.UPLOADED == '1' }}
        with:
          name: ${{ env.PKG_NAME }}
          path: dist/${{ env.PKG_NAME }}

      - name: Upload package to release
        uses: svenstaro/upload-release-action@v2
        if: (github.event_name == 'release' || github.event.inputs.upload_release == 'true') && !cancelled()
        with:
          file: dist/${{ env.PKG_NAME }}
          tag: ${{ env.ref }}
          file_glob: true
          overwrite: true

      - name: Waiting for confirmation
        if: (github.event_name == 'release' || github.event.inputs.upload_pypi == 'true') && !cancelled()
        run: |
          timestamp=$(date +%s%3N)
          echo "open http://${RUNNER}/gpu/ci/confirm?id=${{ github.run_id }}&timestamp=$timestamp&confirmed=1 to confirm releasing to pypi"
          for i in {1..5}; do echo "."; done
          echo "click http://${RUNNER}/gpu/ci/confirm?id=${{ github.run_id }}&timestamp=$timestamp&denied=1 to DENY"
          status=-1
          while [ "$status" -lt 0 ]; do
            status=$(curl -s "http://${RUNNER}/gpu/ci/confirm?id=${{ github.run_id }}&timestamp=$timestamp")
            if [ "$status" == "2" ]; then
              echo "PYPI_RELEASE_CONFIRMATION=$status" >> "$GITHUB_ENV"
            elif [ "$status" -lt 0 ]; then
              sleep 5
            else
              echo "release has been confirmed"
              echo "PYPI_RELEASE_CONFIRMATION=$status" >> "$GITHUB_ENV"
            fi
          done

      - name: Upload sdist to pypi
        if: (github.event_name == 'release' || github.event.inputs.upload_pypi == 'true') && env.PYPI_RELEASE_CONFIRMATION == '1' && !cancelled()
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.PYPI_KEY }}
        run: |
          python -m twine upload dist/*.tar.gz

  release-source-github:
    runs-on: ubuntu-24.04
    if: ${{ inputs.github_vm == true }}
    steps:
      - name: Checkout Codes
        uses: actions/checkout@v6
        with:
          repository: ${{ env.repo }}
          ref: ${{ env.ref }}

      - name: Trust workspace for git
        run: |
          git config --global --add safe.directory "$(pwd)"

      - name: Fetch PR by number
        if: ${{ github.event.inputs.pr_number != 0 }}
        run: |
          PR_NUMBER=${{ github.event.inputs.pr_number }}
          git config --global --add safe.directory "$(pwd)"
          git fetch origin pull/${PR_NUMBER}/head:pr-${PR_NUMBER}
          git checkout pr-${PR_NUMBER}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install requirements
        run: |
          python -m pip install -U build twine setuptools

      - name: Build sdist
        run: |
          python -m build --sdist

      - name: Check dist
        run: |
          ls -ahl dist
          pkg=$(ls -t dist/*.tar.gz | head -n 1 | xargs basename)
          echo "PKG_NAME=$pkg" >> "$GITHUB_ENV"
          twine check "dist/$pkg"

      - name: Upload to artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PKG_NAME }}
          path: dist/${{ env.PKG_NAME }}

      - name: Upload package to release
        uses: svenstaro/upload-release-action@v2
        if: (github.event_name == 'release' || github.event.inputs.upload_release == 'true') && !cancelled()
        with:
          file: dist/${{ env.PKG_NAME }}
          tag: ${{ env.ref }}
          file_glob: true
          overwrite: true

      - name: Waiting for confirmation
        if: (github.event_name == 'release' || github.event.inputs.upload_pypi == 'true') && !cancelled()
        run: |
          for i in {1..5}; do sleep 5; done

      - name: Upload sdist to pypi
        if: (github.event_name == 'release' || github.event.inputs.upload_pypi == 'true') && !cancelled()
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.PYPI_KEY }}
        run: |
          python -m twine upload dist/*.tar.gz
