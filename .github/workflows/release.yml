name: Release

run-name: "${{ github.event.inputs.title }}"

defaults:
  run:
    shell: bash -le {0}

on:
  release:
    types: [ published ]
  repository_dispatch:
  workflow_dispatch:
    inputs:
      title:
        description: 'set a title for this run'
        required: false
        default: ''
      repo:
        description: 'GitHub repo {owner}/{repo}'
        required: false
        default: ''
      ref:
        description: 'GitHub ref: Branch, Tag or Commit SHA'
        required: false
        default: ''
      pr_number:
        description: 'PR Number'
        required: false
        type: number
      upload_release:
        description: 'upload to release (it only works with a tag ref)'
        type: boolean
        required: false
        default: false
      upload_pypi:
        description: 'upload to PyPI'
        type: boolean
        required: false
        default: false
      github_vm:
        description: 'release source on github vm'
        type: boolean
        required: false
        default: false

env:
  RUNNER: 10.0.13.31
  repo: ${{ github.event.inputs.repo || github.repository }}
  ref: ${{ github.event.inputs.ref || github.ref }}

concurrency:
  group: ${{ github.event.inputs.ref || github.ref }}-workflow-release
  cancel-in-progress: true

jobs:
  check-vm:
    runs-on: [ self-hosted, linux ]
    container:
      image: modelcloud/gptqmodel:alpine-ci-v1
    outputs:
      ip: ${{ steps.get_ip.outputs.ip }}
      run_id: ${{ steps.get_ip.outputs.run_id }}
    if: ${{ inputs.github_vm == false }}
    steps:
      - name: Checkout Codes
        uses: actions/checkout@v6
        with:
          repository: ${{ env.repo }}
          ref: ${{ env.ref }}

      - name: Print env
        run: |
          echo "event name: ${{ github.event_name }}"
          echo "repo: ${{ env.repo }}"
          echo "ref: ${{ env.ref }}"
          echo "upload_release: ${{ inputs.upload_release }}"
          echo "upload_pypi: ${{ inputs.upload_pypi }}"

      - name: Select server
        id: get_ip
        run: |
          bash .github/scripts/ci_write_runner_outputs.sh "$RUNNER" "${{ github.run_id }}"

  release-source:
    permissions:
      contents: write
    runs-on: [ self-hosted, xeon5 ]
    needs:
      - check-vm
    if: ${{ inputs.github_vm == false }}
    container:
      image: ${{ needs.check-vm.outputs.ip }}:5000/nvidia/cuda:130-ubuntu24.04_0415
      volumes:
        - /monster/ci/env/entrypoint.sh:/etc/profile.d/01-entrypoint.sh
        - /monster/ci/uv:/opt/uv
    steps:
      - name: Checkout Codes
        uses: actions/checkout@v6
        with:
          repository: ${{ env.repo }}
          ref: ${{ env.ref }}

      - name: Setup release env
        run: |
          export UV_PYTHON=3.14
          echo "UV_PYTHON=3.14" >> "$GITHUB_ENV"

          env_name="gptqmodel_py314_release_source"
          /opt/uv/setup_uv_venv.sh $env_name

      - name: Run shared release source flow
        uses: ./.github/actions/release-source-common
        with:
          pr-number: ${{ github.event.inputs.pr_number || 0 }}
          run-id: ${{ needs.check-vm.outputs.run_id }}
          confirmation-mode: manual
          test-install: 'true'
          upload-local: 'true'
          artifact-continue-on-error: 'true'
          require-pypi-confirmation: 'true'
          pypi-token: ${{ secrets.PYPI_KEY }}

  release-source-github:
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    if: ${{ inputs.github_vm == true }}
    steps:
      - name: Checkout Codes
        uses: actions/checkout@v6
        with:
          repository: ${{ env.repo }}
          ref: ${{ env.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Run shared release source flow
        uses: ./.github/actions/release-source-common
        with:
          pr-number: ${{ github.event.inputs.pr_number || 0 }}
          confirmation-mode: sleep
          test-install: 'false'
          upload-local: 'false'
          artifact-continue-on-error: 'false'
          require-pypi-confirmation: 'false'
          pypi-token: ${{ secrets.PYPI_KEY }}
