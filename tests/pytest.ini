[pytest]
addopts=-s -v
log_cli=true
norecursedirs = tasks
markers =
    ci: CPU-only CI regression coverage for DeviceThreadPool affinity behaviour
    cuda: Requires CUDA device
    cpu: Exercises CPU-specific code paths
    gpu: Exercises GPU-specific code paths
    inference: Inference workloads that replicate models across devices
    model: Loads real model weights or runs model-backed integrations
    mps: Exercises Apple MPS-specific code paths
    slow: Slow-running tests such as model loading, quantization, or benchmark-heavy paths
    timeout: Requires pytest-timeout plugin; retained for downstream compatibility
filterwarnings =
    ignore:Warning only once for all operators.*:UserWarning
